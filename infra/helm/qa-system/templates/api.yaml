apiVersion: apps/v1
kind: Deployment
metadata:
  name: enterprise-qa-api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels: {app.kubernetes.io/name: enterprise-qa-api}
  template:
    metadata:
      labels: {app.kubernetes.io/name: enterprise-qa-api}
    spec:
      serviceAccountName: {{ include "enterprise-qa.serviceAccountName" . }}
      securityContext: {runAsNonRoot: true, seccompProfile: {type: RuntimeDefault}}
      containers:
        - name: api
          image: {{ include "enterprise-qa.image" (list .Values.api.image .) }}
          imagePullPolicy: IfNotPresent
          ports: [{name: http, containerPort: 8000}]
          envFrom: [{configMapRef: {name: enterprise-qa-config}}]
          env:
            - name: QA_DATABASE_URL
              valueFrom: {secretKeyRef: {name: {{ .Values.externalSecrets.secretName }}, key: {{ .Values.externalSecrets.databaseUrlKey }}}}
            - name: QA_CURSOR_SIGNING_KEY
              valueFrom: {secretKeyRef: {name: {{ .Values.externalSecrets.secretName }}, key: {{ .Values.externalSecrets.cursorSigningKeyKey }}}}
            - name: QA_MODEL_PROVIDER_API_KEY
              valueFrom: {secretKeyRef: {name: {{ .Values.externalSecrets.secretName }}, key: {{ .Values.externalSecrets.modelApiKeyKey }}}}
          readinessProbe: {httpGet: {path: /api/v1/health/ready, port: http}, initialDelaySeconds: 5, periodSeconds: 10}
          livenessProbe: {httpGet: {path: /api/v1/health/live, port: http}, initialDelaySeconds: 10, periodSeconds: 20}
          securityContext: {allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: {drop: ["ALL"]}}
          resources: {{- toYaml .Values.api.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: enterprise-qa-api
spec:
  selector: {app.kubernetes.io/name: enterprise-qa-api}
  ports: [{name: http, port: 8000, targetPort: http}]
