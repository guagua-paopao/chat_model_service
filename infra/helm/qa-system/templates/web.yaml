apiVersion: apps/v1
kind: Deployment
metadata:
  name: enterprise-qa-web
spec:
  replicas: {{ .Values.web.replicaCount }}
  selector:
    matchLabels: {app.kubernetes.io/name: enterprise-qa-web}
  template:
    metadata:
      labels: {app.kubernetes.io/name: enterprise-qa-web}
    spec:
      serviceAccountName: {{ include "enterprise-qa.serviceAccountName" . }}
      securityContext: {runAsNonRoot: true, seccompProfile: {type: RuntimeDefault}}
      containers:
        - name: web
          image: {{ include "enterprise-qa.image" (list .Values.web.image .) }}
          ports: [{name: http, containerPort: 3000}]
          envFrom: [{configMapRef: {name: enterprise-qa-config}}]
          readinessProbe: {httpGet: {path: /api/health, port: http}, initialDelaySeconds: 5, periodSeconds: 10}
          securityContext: {allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: {drop: ["ALL"]}}
          resources: {{- toYaml .Values.web.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: enterprise-qa-web
spec:
  selector: {app.kubernetes.io/name: enterprise-qa-web}
  ports: [{name: http, port: 3000, targetPort: http}]
