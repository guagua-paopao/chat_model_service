apiVersion: v1
kind: ConfigMap
metadata:
  name: enterprise-qa-config
data:
  QA_APP_ENV: {{ .Values.config.appEnv | quote }}
  QA_LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  QA_AUTO_CREATE_SCHEMA: "false"
  QA_SEED_DEMO_DATA: "false"
  QA_DEV_AUTH_ENABLED: "false"
  QA_OIDC_ISSUER: {{ .Values.config.oidcIssuer | quote }}
  QA_OIDC_AUDIENCE: {{ .Values.config.oidcAudience | quote }}
  QA_OIDC_JWKS_URL: {{ .Values.config.oidcJwksUrl | quote }}
  QA_OIDC_AUTHORIZATION_URL: {{ .Values.config.oidcAuthorizationUrl | quote }}
  QA_OIDC_TOKEN_URL_INTERNAL: {{ .Values.config.oidcTokenUrl | quote }}
  QA_OIDC_CLIENT_ID: {{ .Values.config.oidcClientId | quote }}
  QA_WEB_PUBLIC_URL: {{ .Values.config.webPublicUrl | quote }}
  QA_API_INTERNAL_URL: {{ .Values.config.apiInternalUrl | quote }}
  QA_COOKIE_SECURE: "true"
  QA_FAKE_MODEL_ENABLED: "false"
  QA_MODEL_PROVIDER_ENABLED: {{ .Values.config.modelProviderEnabled | quote }}
  QA_MODEL_PROVIDER_BASE_URL: {{ .Values.config.modelProviderBaseUrl | quote }}
  QA_MODEL_PROVIDER_MODEL: {{ .Values.config.modelProviderModel | quote }}
  QA_MODEL_CONNECT_TIMEOUT_SECONDS: {{ .Values.config.modelConnectTimeoutSeconds | quote }}
  QA_MODEL_FIRST_TOKEN_TIMEOUT_SECONDS: {{ .Values.config.modelFirstTokenTimeoutSeconds | quote }}
  QA_MODEL_TOTAL_TIMEOUT_SECONDS: {{ .Values.config.modelTotalTimeoutSeconds | quote }}
  QA_MODEL_MAX_ATTEMPTS: {{ .Values.config.modelMaxAttempts | quote }}
  QA_MODEL_MAX_CONCURRENCY: {{ .Values.config.modelMaxConcurrency | quote }}
  QA_CHAT_REQUESTS_PER_MINUTE: {{ .Values.config.chatRequestsPerMinute | quote }}
  QA_CHAT_TENANT_CONCURRENCY: {{ .Values.config.chatTenantConcurrency | quote }}
  QA_CHAT_USER_CONCURRENCY: {{ .Values.config.chatUserConcurrency | quote }}
  QA_CHAT_MAX_INPUT_TOKENS: {{ .Values.config.chatMaxInputTokens | quote }}
  QA_CHAT_MAX_OUTPUT_TOKENS: {{ .Values.config.chatMaxOutputTokens | quote }}
