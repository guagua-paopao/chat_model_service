apiVersion: v1
kind: ConfigMap
metadata:
  name: enterprise-qa-config
data:
  QA_APP_ENV: {{ .Values.config.appEnv | quote }}
  QA_LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  QA_AUTO_CREATE_SCHEMA: "false"
  QA_SEED_DEMO_DATA: "false"
  QA_DEV_AUTH_ENABLED: "false"
  QA_OIDC_ISSUER: {{ .Values.config.oidcIssuer | quote }}
  QA_OIDC_AUDIENCE: {{ .Values.config.oidcAudience | quote }}
  QA_OIDC_JWKS_URL: {{ .Values.config.oidcJwksUrl | quote }}
  QA_OIDC_AUTHORIZATION_URL: {{ .Values.config.oidcAuthorizationUrl | quote }}
  QA_OIDC_TOKEN_URL_INTERNAL: {{ .Values.config.oidcTokenUrl | quote }}
  QA_OIDC_CLIENT_ID: {{ .Values.config.oidcClientId | quote }}
  QA_WEB_PUBLIC_URL: {{ .Values.config.webPublicUrl | quote }}
  QA_API_INTERNAL_URL: {{ .Values.config.apiInternalUrl | quote }}
  QA_COOKIE_SECURE: "true"
  QA_FAKE_MODEL_ENABLED: "false"
  QA_MODEL_PROVIDER_ENABLED: {{ .Values.config.modelProviderEnabled | quote }}
  QA_MODEL_PROVIDER_BASE_URL: {{ .Values.config.modelProviderBaseUrl | quote }}
  QA_MODEL_PROVIDER_MODEL: {{ .Values.config.modelProviderModel | quote }}
  QA_MODEL_CONNECT_TIMEOUT_SECONDS: {{ .Values.config.modelConnectTimeoutSeconds | quote }}
  QA_MODEL_FIRST_TOKEN_TIMEOUT_SECONDS: {{ .Values.config.modelFirstTokenTimeoutSeconds | quote }}
  QA_MODEL_TOTAL_TIMEOUT_SECONDS: {{ .Values.config.modelTotalTimeoutSeconds | quote }}
  QA_MODEL_MAX_ATTEMPTS: {{ .Values.config.modelMaxAttempts | quote }}
  QA_MODEL_MAX_CONCURRENCY: {{ .Values.config.modelMaxConcurrency | quote }}
  QA_CHAT_REQUESTS_PER_MINUTE: {{ .Values.config.chatRequestsPerMinute | quote }}
  QA_CHAT_TENANT_CONCURRENCY: {{ .Values.config.chatTenantConcurrency | quote }}
  QA_CHAT_USER_CONCURRENCY: {{ .Values.config.chatUserConcurrency | quote }}
  QA_CHAT_MAX_INPUT_TOKENS: {{ .Values.config.chatMaxInputTokens | quote }}
  QA_CHAT_MAX_OUTPUT_TOKENS: {{ .Values.config.chatMaxOutputTokens | quote }}
  QA_OBJECT_STORE_BACKEND: {{ .Values.config.objectStoreBackend | quote }}
  QA_OBJECT_STORE_ENDPOINT_URL: {{ .Values.config.objectStoreEndpointUrl | quote }}
  QA_OBJECT_STORE_PUBLIC_ENDPOINT_URL: {{ .Values.config.objectStorePublicEndpointUrl | quote }}
  QA_OBJECT_STORE_REGION: {{ .Values.config.objectStoreRegion | quote }}
  QA_OBJECT_STORE_QUARANTINE_BUCKET: {{ .Values.config.objectStoreQuarantineBucket | quote }}
  QA_OBJECT_STORE_PUBLISHED_BUCKET: {{ .Values.config.objectStorePublishedBucket | quote }}
  QA_OBJECT_STORE_AUTO_CREATE_BUCKETS: "false"
  QA_UPLOAD_PRESIGN_SECONDS: {{ .Values.config.uploadPresignSeconds | quote }}
  QA_INGESTION_MAX_UPLOAD_BYTES: {{ .Values.config.ingestionMaxUploadBytes | quote }}
  QA_INGESTION_MAX_ATTEMPTS: {{ .Values.config.ingestionMaxAttempts | quote }}
  QA_INGESTION_JOB_LEASE_SECONDS: {{ .Values.config.ingestionJobLeaseSeconds | quote }}
  QA_INGESTION_WORKER_POLL_SECONDS: {{ .Values.config.ingestionWorkerPollSeconds | quote }}
  QA_MALWARE_SCANNER_BACKEND: {{ .Values.config.malwareScannerBackend | quote }}
  QA_CLAMAV_HOST: {{ .Values.config.clamavHost | quote }}
  QA_CLAMAV_PORT: {{ .Values.config.clamavPort | quote }}
  QA_CLAMAV_TIMEOUT_SECONDS: {{ .Values.config.clamavTimeoutSeconds | quote }}
  QA_CHUNK_MAX_TOKENS: {{ .Values.config.chunkMaxTokens | quote }}
  QA_CHUNK_OVERLAP_TOKENS: {{ .Values.config.chunkOverlapTokens | quote }}
  QA_FAKE_EMBEDDING_ENABLED: "false"
  QA_EMBEDDING_PROVIDER_ENABLED: {{ .Values.config.embeddingProviderEnabled | quote }}
  QA_EMBEDDING_PROVIDER_BASE_URL: {{ .Values.config.embeddingProviderBaseUrl | quote }}
  QA_EMBEDDING_PROVIDER_MODEL: {{ .Values.config.embeddingProviderModel | quote }}
  QA_EMBEDDING_DIMENSIONS: {{ .Values.config.embeddingDimensions | quote }}
  QA_RAG_ENABLED: {{ .Values.config.ragEnabled | quote }}
  QA_RETRIEVAL_VECTOR_CANDIDATES: {{ .Values.config.retrievalVectorCandidates | quote }}
  QA_RETRIEVAL_LEXICAL_CANDIDATES: {{ .Values.config.retrievalLexicalCandidates | quote }}
  QA_RETRIEVAL_RERANK_CANDIDATES: {{ .Values.config.retrievalRerankCandidates | quote }}
  QA_RETRIEVAL_FINAL_K: {{ .Values.config.retrievalFinalK | quote }}
  QA_RETRIEVAL_RRF_K: {{ .Values.config.retrievalRrfK | quote }}
  QA_RETRIEVAL_CONTEXT_MAX_TOKENS: {{ .Values.config.retrievalContextMaxTokens | quote }}
  QA_RETRIEVAL_MIN_RELEVANCE: {{ .Values.config.retrievalMinRelevance | quote }}
  QA_RETRIEVAL_MIN_QUERY_COVERAGE: {{ .Values.config.retrievalMinQueryCoverage | quote }}
  QA_CITATION_MAX_QUOTE_CHARS: {{ .Values.config.citationMaxQuoteChars | quote }}
  QA_FAKE_RERANKER_ENABLED: "false"
  QA_RERANKER_PROVIDER_ENABLED: {{ .Values.config.rerankerProviderEnabled | quote }}
  QA_RERANKER_PROVIDER_BASE_URL: {{ .Values.config.rerankerProviderBaseUrl | quote }}
  QA_RERANKER_PROVIDER_MODEL: {{ .Values.config.rerankerProviderModel | quote }}
  QA_RERANKER_TIMEOUT_SECONDS: {{ .Values.config.rerankerTimeoutSeconds | quote }}
  QA_LOCAL_GOVERNANCE_EVALUATOR_ENABLED: "false"
  QA_LOCAL_QUALITY_EVALUATOR_ENABLED: "false"
  QA_TELEMETRY_EXPORT_ENABLED: {{ .Values.config.telemetryExportEnabled | quote }}
  QA_OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.config.otelExporterOtlpEndpoint | quote }}
  QA_OTEL_SERVICE_NAME: {{ .Values.config.otelServiceName | quote }}
  QA_RELEASE_REVISION: {{ .Values.config.releaseRevision | quote }}
  QA_TELEMETRY_METRIC_EXPORT_INTERVAL_MS: {{ .Values.config.telemetryMetricExportIntervalMs | quote }}
