openapi: 3.1.0
info:
  title: Enterprise QA System API
  version: 1.7.0-s7
  description: |
    企业知识问答系统的核心契约。租户从已验证的身份上下文解析，客户端不得自报 tenant_id。
    S4 知识问答在 ACL 过滤后执行混合检索与重排，并保存检索、提示词、模型和引用快照。
    流式知识回答先缓冲并验证引用，再向客户端输出；SSE 事件结构见 S4 API 设计文档。
    S5 增加服务端目录态、集中授权、不可变配置门禁、数据库共享配额、哈希链治理审计和安全事件台账。
    S7 增加不可变发布候选、UAT/多角色签署、分阶段灰度、自动停止/回滚和运营移交证据。
servers:
  - url: https://qa.example.com/api/v1
    description: Production placeholder
security:
  - oauth2: []
tags:
  - name: Identity
  - name: Conversations
  - name: Chat
  - name: Knowledge
  - name: Documents
  - name: Retrieval
  - name: Feedback
  - name: Operations
  - name: Enterprise Governance
  - name: Release Operations
paths:
  /me:
    get:
      tags: [Identity]
      summary: Get the authenticated actor and trusted tenant context
      operationId: getCurrentActor
      security:
        - oauth2: [qa:ask]
      responses:
        '200':
          description: Current actor; tenant is resolved from the validated identity
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Me'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
  /models:
    get:
      tags: [Chat]
      summary: List safe model capabilities available to the current actor
      operationId: listModels
      security:
        - oauth2: [qa:ask]
      responses:
        '200':
          description: Safe capability metadata; endpoints and secrets are never returned
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: {$ref: '#/components/schemas/ModelSummary'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
  /conversations:
    post:
      tags: [Conversations]
      summary: Create a conversation
      operationId: createConversation
      security:
        - oauth2: [qa:ask]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConversationCreate'
      responses:
        '201':
          description: Created
          headers:
            ETag:
              schema: {type: string}
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conversation'
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
    get:
      tags: [Conversations]
      summary: List the current actor's conversations
      operationId: listConversations
      security:
        - oauth2: [qa:ask]
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
        - name: status
          in: query
          schema:
            type: string
            enum: [active, archived]
      responses:
        '200':
          description: Page of conversations
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: {$ref: '#/components/schemas/Conversation'}
                  next_cursor: {type: [string, 'null']}
  /conversations/{conversation_id}:
    parameters:
      - $ref: '#/components/parameters/ConversationId'
    get:
      tags: [Conversations]
      summary: Get a conversation and a page of messages
      operationId: getConversation
      security:
        - oauth2: [qa:ask]
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Conversation detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Conversation'
                  - type: object
                    required: [messages]
                    properties:
                      messages:
                        type: array
                        items: {$ref: '#/components/schemas/Message'}
                      next_cursor: {type: [string, 'null']}
        '404': {$ref: '#/components/responses/NotFound'}
    patch:
      tags: [Conversations]
      summary: Update conversation title or status
      operationId: updateConversation
      security:
        - oauth2: [qa:ask]
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              minProperties: 1
              additionalProperties: false
              properties:
                title: {type: string, minLength: 1, maxLength: 300}
                status: {type: string, enum: [active, archived]}
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Conversation'}
        '412': {$ref: '#/components/responses/PreconditionFailed'}
    delete:
      tags: [Conversations]
      summary: Soft-delete a conversation
      operationId: deleteConversation
      security:
        - oauth2: [qa:ask]
      responses:
        '204': {description: Deleted}
        '404': {$ref: '#/components/responses/NotFound'}
  /chat/completions:
    post:
      tags: [Chat]
      summary: Create a model answer
      description: |
        With stream=true and Accept=text/event-stream, the body is an SSE event stream.
        Errors after stream establishment are sent as an `error` event.
        Knowledge modes require at least one knowledge_base_id. The server emits
        `message.started`, `retrieval.completed`, validated `message.delta`, zero or
        more `citation`, `usage`, and `message.completed` events. Evidence or safety
        abstentions do not call the model. General mode does not access enterprise knowledge.
      operationId: createChatCompletion
      security:
        - oauth2: [qa:ask]
      parameters:
        - $ref: '#/components/parameters/RequestId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatCompletionRequest'
      responses:
        '200':
          description: SSE stream or complete response, depending on `stream`
          content:
            text/event-stream:
              schema:
                type: string
            application/json:
              schema:
                $ref: '#/components/schemas/ChatCompletionResponse'
        '400': {$ref: '#/components/responses/BadRequest'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '429': {$ref: '#/components/responses/TooManyRequests'}
        '502': {$ref: '#/components/responses/UpstreamError'}
  /messages/{message_id}/cancel:
    post:
      tags: [Chat]
      summary: Cancel a pending or streaming assistant message
      operationId: cancelMessage
      security:
        - oauth2: [qa:ask]
      parameters:
        - $ref: '#/components/parameters/MessageId'
      responses:
        '202':
          description: Cancellation accepted
          content:
            application/json:
              schema:
                type: object
                required: [message_id, status]
                properties:
                  message_id: {$ref: '#/components/schemas/Uuid'}
                  status: {type: string, enum: [cancelling, cancelled]}
        '409': {$ref: '#/components/responses/Conflict'}
        '404': {$ref: '#/components/responses/NotFound'}
  /messages/{message_id}/retry:
    post:
      tags: [Chat]
      summary: Retry a failed or cancelled assistant message
      operationId: retryMessage
      security:
        - oauth2: [qa:ask]
      parameters:
        - $ref: '#/components/parameters/MessageId'
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/RetryRequest'}
      responses:
        '200':
          description: SSE stream or complete response, depending on `stream`
          content:
            text/event-stream: {schema: {type: string}}
            application/json: {schema: {$ref: '#/components/schemas/ChatCompletionResponse'}}
        '404': {$ref: '#/components/responses/NotFound'}
        '409': {$ref: '#/components/responses/Conflict'}
        '429': {$ref: '#/components/responses/TooManyRequests'}
  /messages/{message_id}/feedback:
    post:
      tags: [Feedback]
      summary: Create or replace feedback by the current actor
      operationId: upsertMessageFeedback
      security:
        - oauth2: [qa:feedback]
      parameters:
        - $ref: '#/components/parameters/MessageId'
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/FeedbackRequest'}
      responses:
        '200':
          description: Feedback saved
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Feedback'}
        '404': {$ref: '#/components/responses/NotFound'}
  /messages/{message_id}/citations/{citation_id}:
    get:
      tags: [Retrieval]
      summary: Reauthorize and return a controlled citation preview
      description: The source document ACL is evaluated again on every request; no raw object URL is exposed.
      operationId: getCitation
      security:
        - oauth2: [qa:ask]
      parameters:
        - $ref: '#/components/parameters/MessageId'
        - $ref: '#/components/parameters/CitationId'
      responses:
        '200':
          description: Authorized immutable citation snapshot
          content:
            application/json:
              schema: {$ref: '#/components/schemas/CitationDetail'}
        '404': {$ref: '#/components/responses/NotFound'}
  /knowledge-bases:
    post:
      tags: [Knowledge]
      summary: Create a knowledge base
      operationId: createKnowledgeBase
      security:
        - oauth2: [qa:knowledge:write]
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/KnowledgeBaseCreate'}
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: {$ref: '#/components/schemas/KnowledgeBase'}
        '409': {$ref: '#/components/responses/Conflict'}
    get:
      tags: [Knowledge]
      summary: List knowledge bases visible to the current actor
      operationId: listKnowledgeBases
      security:
        - oauth2: [qa:knowledge:read]
      responses:
        '200':
          description: Page
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: {$ref: '#/components/schemas/KnowledgeBase'}
  /knowledge-bases/{knowledge_base_id}/documents:
    post:
      tags: [Documents]
      summary: Create a document version and a presigned upload
      operationId: createDocumentUpload
      security:
        - oauth2: [qa:knowledge:write]
      parameters:
        - $ref: '#/components/parameters/KnowledgeBaseId'
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/DocumentCreate'}
      responses:
        '201':
          description: Upload created
          content:
            application/json:
              schema: {$ref: '#/components/schemas/DocumentUpload'}
        '413': {$ref: '#/components/responses/PayloadTooLarge'}
        '415': {$ref: '#/components/responses/UnsupportedMediaType'}
  /documents/{document_id}/versions:
    post:
      tags: [Documents]
      summary: Create an immutable successor version and a presigned upload
      operationId: createDocumentVersionUpload
      security:
        - oauth2: [qa:knowledge:write]
      parameters:
        - $ref: '#/components/parameters/DocumentId'
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/DocumentVersionCreate'}
      responses:
        '201':
          description: Immutable version and upload grant created
          content:
            application/json:
              schema: {$ref: '#/components/schemas/DocumentUpload'}
        '409': {$ref: '#/components/responses/Conflict'}
  /uploads/{version_id}/content:
    put:
      tags: [Documents]
      summary: Local-development signed upload target; S3 deployments return a direct S3 URL
      operationId: receiveLocalDocumentUpload
      security: []
      parameters:
        - name: version_id
          in: path
          required: true
          schema: {$ref: '#/components/schemas/Uuid'}
        - name: token
          in: query
          required: true
          schema: {type: string, minLength: 32, maxLength: 4096}
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema: {type: string, format: binary}
      responses:
        '200':
          description: Object stored in quarantine
          content:
            application/json:
              schema:
                type: object
                required: [version_id, status]
                properties:
                  version_id: {$ref: '#/components/schemas/Uuid'}
                  status: {type: string, const: uploaded}
        '400': {$ref: '#/components/responses/BadRequest'}
        '413': {$ref: '#/components/responses/PayloadTooLarge'}
  /documents/{document_id}/upload-complete:
    post:
      tags: [Documents]
      summary: Verify upload and enqueue ingestion
      operationId: completeDocumentUpload
      security:
        - oauth2: [qa:knowledge:write]
      parameters:
        - $ref: '#/components/parameters/DocumentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [version_id, sha256]
              properties:
                version_id: {$ref: '#/components/schemas/Uuid'}
                sha256: {$ref: '#/components/schemas/Sha256'}
      responses:
        '202':
          description: Ingestion enqueued
          content:
            application/json:
              schema: {$ref: '#/components/schemas/JobSummary'}
        '409': {$ref: '#/components/responses/Conflict'}
        '422': {$ref: '#/components/responses/UnprocessableContent'}
  /documents/{document_id}:
    get:
      tags: [Documents]
      summary: Get document metadata and latest job state
      operationId: getDocument
      security:
        - oauth2: [qa:knowledge:read]
      parameters:
        - $ref: '#/components/parameters/DocumentId'
      responses:
        '200':
          description: Document
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Document'}
        '404': {$ref: '#/components/responses/NotFound'}
  /ingestion-jobs/{job_id}:
    get:
      tags: [Operations]
      summary: Get an asynchronous job
      operationId: getJob
      security:
        - oauth2: [qa:ingestion:read]
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: Job
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Job'}
        '404': {$ref: '#/components/responses/NotFound'}
  /ingestion-jobs/{job_id}/retry:
    post:
      tags: [Operations]
      summary: Retry a retryable failed job
      operationId: retryJob
      security:
        - oauth2: [qa:ingestion:retry]
      parameters:
        - $ref: '#/components/parameters/JobId'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '202':
          description: Retry accepted
          content:
            application/json:
              schema: {$ref: '#/components/schemas/JobSummary'}
        '409': {$ref: '#/components/responses/Conflict'}
  /retrieval/search:
    post:
      tags: [Retrieval]
      summary: Legacy S3 vector-search diagnostic within the actor's authorized scope
      description: Operational diagnostic only; grounded chat uses the internal S4 hybrid retrieval pipeline.
      operationId: searchKnowledge
      security:
        - oauth2: [qa:knowledge:read]
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/SearchRequest'}
      responses:
        '200':
          description: Authorized results
          content:
            application/json:
              schema: {$ref: '#/components/schemas/SearchResponse'}
        '403': {$ref: '#/components/responses/Forbidden'}
  /health/live:
    get:
      tags: [Operations]
      summary: Liveness probe
      operationId: liveness
      security: []
      responses:
        '200':
          description: Process alive
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status: {type: string, const: ok}
  /health/ready:
    get:
      tags: [Operations]
      summary: Readiness probe
      operationId: readiness
      security: []
      responses:
        '200':
          description: Ready for traffic
          content:
            application/json:
              schema:
                type: object
                required: [status, checks]
                properties:
                  status: {type: string, const: ready}
                  checks:
                    type: object
                    additionalProperties: {type: string}
        '503': {$ref: '#/components/responses/ServiceUnavailable'}
  /admin/users:
    get:
      tags: [Enterprise Governance]
      summary: List tenant-scoped provisioned users and server-resolved memberships
      operationId: listGovernanceUsers
      security: [{oauth2: [qa:admin:users:read]}]
      responses:
        '200':
          description: Provisioned users
          content:
            application/json:
              schema: {$ref: '#/components/schemas/AdminUserList'}
        '403': {$ref: '#/components/responses/Forbidden'}
  /admin/users/{user_id}:
    patch:
      tags: [Enterprise Governance]
      summary: Activate or disable a user with optimistic concurrency and approval evidence
      operationId: patchGovernanceUser
      security: [{oauth2: [qa:admin:users:write]}]
      parameters:
        - name: user_id
          in: path
          required: true
          schema: {$ref: '#/components/schemas/Uuid'}
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/UserStatusPatch'}
      responses:
        '200':
          description: Updated user; effective on the next principal resolution
          headers: {ETag: {schema: {type: string}}}
          content:
            application/json:
              schema: {$ref: '#/components/schemas/AdminUser'}
        '412': {$ref: '#/components/responses/PreconditionFailed'}
  /admin/groups:
    get:
      tags: [Enterprise Governance]
      summary: List tenant groups and effective member counts
      operationId: listGovernanceGroups
      security: [{oauth2: [qa:admin:groups:read]}]
      responses:
        '200':
          description: Groups
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items: {type: array, items: {$ref: '#/components/schemas/AdminGroup'}}
  /admin/rag-configs:
    get:
      tags: [Enterprise Governance]
      summary: List immutable RAG configuration versions
      operationId: listRagConfigs
      security: [{oauth2: [qa:rag-config:read]}]
      responses:
        '200':
          description: Versions
          content:
            application/json:
              schema: {$ref: '#/components/schemas/RagConfigList'}
    post:
      tags: [Enterprise Governance]
      summary: Create an immutable RAG configuration draft
      operationId: createRagConfigDraft
      security: [{oauth2: [qa:rag-config:write]}]
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/RagConfigDraft'}
      responses:
        '201':
          description: Draft created
          content:
            application/json:
              schema: {$ref: '#/components/schemas/RagConfig'}
        '422': {$ref: '#/components/responses/UnprocessableContent'}
  /admin/rag-configs/{config_id}/evaluations:
    post:
      tags: [Enterprise Governance]
      summary: Run the server-owned, versioned configuration gate
      operationId: evaluateRagConfig
      security: [{oauth2: [qa:rag-config:evaluate]}]
      parameters: [{$ref: '#/components/parameters/ConfigId'}]
      responses:
        '201':
          description: Evaluation evidence
          content:
            application/json:
              schema: {$ref: '#/components/schemas/RagConfigEvaluation'}
  /admin/rag-configs/{config_id}/approve:
    post:
      tags: [Enterprise Governance]
      summary: Independently approve a passing configuration
      operationId: approveRagConfig
      security: [{oauth2: [qa:rag-config:approve]}]
      parameters: [{$ref: '#/components/parameters/ConfigId'}]
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/GovernanceAction'}
      responses:
        '200':
          description: Approved
          content:
            application/json:
              schema: {$ref: '#/components/schemas/RagConfig'}
        '409': {$ref: '#/components/responses/Conflict'}
  /admin/rag-configs/{config_id}/publish:
    post:
      tags: [Enterprise Governance]
      summary: Publish an independently approved configuration
      operationId: publishRagConfig
      security: [{oauth2: [qa:rag-config:publish]}]
      parameters: [{$ref: '#/components/parameters/ConfigId'}]
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/GovernanceAction'}
      responses:
        '200':
          description: Published
          content:
            application/json:
              schema: {$ref: '#/components/schemas/RagConfig'}
  /admin/rag-configs/{config_id}/rollback:
    post:
      tags: [Enterprise Governance]
      summary: Publish a new immutable clone of a previously passing version
      operationId: rollbackRagConfig
      security: [{oauth2: [qa:rag-config:rollback]}]
      parameters: [{$ref: '#/components/parameters/ConfigId'}]
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/GovernanceAction'}
      responses:
        '200':
          description: Rollback clone published
          content:
            application/json:
              schema: {$ref: '#/components/schemas/RagConfig'}
  /admin/quota-policies/tenant:
    get:
      tags: [Enterprise Governance]
      summary: Get the active tenant quota policy
      operationId: getTenantQuota
      security: [{oauth2: [qa:quota:read]}]
      responses:
        '200':
          description: Tenant quota policy
          headers: {ETag: {schema: {type: string}}}
          content:
            application/json:
              schema: {$ref: '#/components/schemas/QuotaPolicy'}
    patch:
      tags: [Enterprise Governance]
      summary: Update the active tenant quota policy
      operationId: patchTenantQuota
      security: [{oauth2: [qa:quota:write]}]
      parameters: [{$ref: '#/components/parameters/IfMatch'}]
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/QuotaPolicyPatch'}
      responses:
        '200':
          description: Updated policy
          content:
            application/json:
              schema: {$ref: '#/components/schemas/QuotaPolicy'}
  /admin/audit-logs:
    get:
      tags: [Enterprise Governance]
      summary: Query tenant-scoped tamper-evident governance events
      operationId: listGovernanceAudit
      security: [{oauth2: [qa:audit:read]}]
      responses:
        '200':
          description: Safe audit events; raw prompts and secrets are excluded
          content:
            application/json:
              schema: {$ref: '#/components/schemas/GovernanceAuditList'}
  /admin/audit-logs/integrity:
    get:
      tags: [Enterprise Governance]
      summary: Verify the per-tenant governance hash chain
      operationId: verifyGovernanceAudit
      security: [{oauth2: [qa:audit:verify]}]
      responses:
        '200':
          description: Integrity result
          content:
            application/json:
              schema: {$ref: '#/components/schemas/AuditIntegrity'}
  /admin/usage-summary:
    get:
      tags: [Enterprise Governance]
      summary: Aggregate bounded tenant usage without high-cardinality labels
      operationId: getUsageSummary
      security: [{oauth2: [qa:usage:read]}]
      responses:
        '200':
          description: Usage summary
          content: {application/json: {schema: {type: object}}}
  /admin/quality-summary:
    get:
      tags: [Enterprise Governance]
      summary: Aggregate retrieval, abstention, citation and feedback quality signals
      operationId: getQualitySummary
      security: [{oauth2: [qa:usage:read]}]
      responses:
        '200':
          description: Quality summary
          content: {application/json: {schema: {type: object}}}
  /evaluations/runs:
    post:
      tags: [Operations]
      summary: Execute a versioned candidate quality evaluation
      operationId: createEvaluationRun
      security: [{oauth2: [qa:evaluation:run]}]
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/EvaluationRunCreate'}
      responses:
        '201':
          description: Completed local evaluation run; production dispatch is external
          content:
            application/json:
              schema: {$ref: '#/components/schemas/EvaluationRun'}
        '422': {$ref: '#/components/responses/UnprocessableContent'}
        '503': {$ref: '#/components/responses/ServiceUnavailable'}
    get:
      tags: [Operations]
      summary: List tenant-scoped immutable evaluation runs
      operationId: listEvaluationRuns
      security: [{oauth2: [qa:evaluation:read]}]
      parameters:
        - $ref: '#/components/parameters/Limit'
        - name: gate_result
          in: query
          schema: {type: string, enum: [passed, failed]}
      responses:
        '200':
          description: Evaluation runs
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [items]
                properties:
                  items: {type: array, items: {$ref: '#/components/schemas/EvaluationRun'}}
  /evaluations/runs/{run_id}:
    get:
      tags: [Operations]
      summary: Read one tenant-scoped immutable evaluation run
      operationId: getEvaluationRun
      security: [{oauth2: [qa:evaluation:read]}]
      parameters:
        - name: run_id
          in: path
          required: true
          schema: {$ref: '#/components/schemas/Uuid'}
      responses:
        '200':
          description: Evaluation run
          content:
            application/json:
              schema: {$ref: '#/components/schemas/EvaluationRun'}
        '404': {$ref: '#/components/responses/NotFound'}
  /usage:
    get:
      tags: [Operations]
      summary: Read a bounded tenant usage ledger view
      operationId: getUsageReport
      security: [{oauth2: [qa:usage:read]}]
      parameters:
        - {name: from_time, in: query, schema: {type: string, format: date-time}}
        - {name: to_time, in: query, schema: {type: string, format: date-time}}
        - {name: group_by, in: query, schema: {type: string, enum: [none, model, operation], default: none}}
        - {name: model, in: query, schema: {type: string, minLength: 1, maxLength: 128}}
      responses:
        '200':
          description: Maximum 31-day aggregate usage report without raw content
          content:
            application/json:
              schema: {$ref: '#/components/schemas/UsageReport'}
        '422': {$ref: '#/components/responses/UnprocessableContent'}
  /admin/operations/snapshot:
    get:
      tags: [Operations]
      summary: Read a bounded process and tenant diagnostic snapshot
      description: This endpoint is explicitly not production SLO evidence.
      operationId: getOperationsSnapshot
      security: [{oauth2: [qa:operations:read]}]
      responses:
        '200':
          description: Privacy-safe diagnostic snapshot
          content:
            application/json:
              schema: {$ref: '#/components/schemas/OperationsSnapshot'}
  /admin/security-incidents:
    get:
      tags: [Enterprise Governance]
      summary: List tenant security incidents
      operationId: listSecurityIncidents
      security: [{oauth2: [qa:security-incident:read]}]
      responses:
        '200':
          description: Incidents
          content: {application/json: {schema: {type: object}}}
    post:
      tags: [Enterprise Governance]
      summary: Open a security incident with safe evidence references
      operationId: createSecurityIncident
      security: [{oauth2: [qa:security-incident:write]}]
      responses:
        '201':
          description: Incident opened
          content: {application/json: {schema: {$ref: '#/components/schemas/SecurityIncident'}}}
  /admin/security-incidents/{incident_id}:
    patch:
      tags: [Enterprise Governance]
      summary: Transition a security incident state
      operationId: patchSecurityIncident
      security: [{oauth2: [qa:security-incident:write]}]
      parameters:
        - name: incident_id
          in: path
          required: true
          schema: {$ref: '#/components/schemas/Uuid'}
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '200':
          description: Incident transitioned
          content: {application/json: {schema: {$ref: '#/components/schemas/SecurityIncident'}}}
  /admin/releases:
    get:
      tags: [Release Operations]
      summary: List tenant-scoped release candidates and evidence
      operationId: listReleaseCandidates
      security: [{oauth2: [qa:release:read]}]
      responses:
        '200': {description: Release candidates, content: {application/json: {schema: {type: object, required: [items], properties: {items: {type: array, items: {$ref: '#/components/schemas/ReleaseCandidate'}}}}}}}
    post:
      tags: [Release Operations]
      summary: Freeze an immutable release candidate from a passing evaluation
      operationId: createReleaseCandidate
      security: [{oauth2: [qa:release:create]}]
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/ReleaseCandidateCreate'}}}}
      responses:
        '201': {description: Candidate frozen, content: {application/json: {schema: {$ref: '#/components/schemas/ReleaseCandidate'}}}}
        '409': {$ref: '#/components/responses/Conflict'}
  /admin/releases/{release_id}:
    get:
      tags: [Release Operations]
      summary: Read a release candidate with UAT, signoffs and rollout events
      operationId: getReleaseCandidate
      security: [{oauth2: [qa:release:read]}]
      parameters: [{name: release_id, in: path, required: true, schema: {$ref: '#/components/schemas/Uuid'}}]
      responses:
        '200': {description: Release evidence, content: {application/json: {schema: {$ref: '#/components/schemas/ReleaseCandidate'}}}}
        '404': {$ref: '#/components/responses/NotFound'}
  /admin/releases/{release_id}/uat-results:
    post:
      tags: [Release Operations]
      summary: Append one immutable UC-01 through UC-05 UAT result
      operationId: recordReleaseUat
      security: [{oauth2: [qa:release:uat]}]
      parameters: [{name: release_id, in: path, required: true, schema: {$ref: '#/components/schemas/Uuid'}}]
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/ReleaseUatResultCreate'}}}}
      responses:
        '200': {description: Updated release evidence, content: {application/json: {schema: {$ref: '#/components/schemas/ReleaseCandidate'}}}}
        '409': {$ref: '#/components/responses/Conflict'}
  /admin/releases/{release_id}/signoffs:
    post:
      tags: [Release Operations]
      summary: Append an independent product, business, data, security or SRE signoff
      operationId: signoffRelease
      security: [{oauth2: [qa:release:signoff]}]
      parameters: [{name: release_id, in: path, required: true, schema: {$ref: '#/components/schemas/Uuid'}}]
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/ReleaseSignoffCreate'}}}}
      responses:
        '200': {description: Updated release evidence, content: {application/json: {schema: {$ref: '#/components/schemas/ReleaseCandidate'}}}}
        '409': {$ref: '#/components/responses/Conflict'}
  /admin/releases/{release_id}/rollout/start:
    post:
      tags: [Release Operations]
      summary: Start an approved candidate at the dark stage
      operationId: startReleaseRollout
      security: [{oauth2: [qa:release:rollout]}]
      parameters: [{name: release_id, in: path, required: true, schema: {$ref: '#/components/schemas/Uuid'}}]
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/ReleaseActionRequest'}}}}
      responses: {'200': {description: Dark rollout started, content: {application/json: {schema: {$ref: '#/components/schemas/ReleaseCandidate'}}}}, '409': {$ref: '#/components/responses/Conflict'}}
  /admin/releases/{release_id}/rollout/advance:
    post:
      tags: [Release Operations]
      summary: Evaluate an observation window and advance, stop or roll back
      operationId: advanceReleaseRollout
      security: [{oauth2: [qa:release:rollout]}]
      parameters: [{name: release_id, in: path, required: true, schema: {$ref: '#/components/schemas/Uuid'}}]
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/ReleaseRolloutAdvance'}}}}
      responses: {'200': {description: Deterministic rollout decision, content: {application/json: {schema: {$ref: '#/components/schemas/ReleaseCandidate'}}}}, '409': {$ref: '#/components/responses/Conflict'}}
  /admin/releases/{release_id}/rollout/stop:
    post:
      tags: [Release Operations]
      summary: Manually stop an active rollout
      operationId: stopReleaseRollout
      security: [{oauth2: [qa:release:rollout]}]
      parameters: [{name: release_id, in: path, required: true, schema: {$ref: '#/components/schemas/Uuid'}}]
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/ReleaseActionRequest'}}}}
      responses: {'200': {description: Rollout stopped, content: {application/json: {schema: {$ref: '#/components/schemas/ReleaseCandidate'}}}}}
  /admin/releases/{release_id}/rollout/rollback:
    post:
      tags: [Release Operations]
      summary: Roll back to the candidate's immutable rollback target
      operationId: rollbackRelease
      security: [{oauth2: [qa:release:rollout]}]
      parameters: [{name: release_id, in: path, required: true, schema: {$ref: '#/components/schemas/Uuid'}}]
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/ReleaseActionRequest'}}}}
      responses: {'200': {description: Rollback recorded, content: {application/json: {schema: {$ref: '#/components/schemas/ReleaseCandidate'}}}}}
components:
  securitySchemes:
    oauth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://idp.example.com/oauth2/authorize
          tokenUrl: https://idp.example.com/oauth2/token
          scopes:
            qa:ask: Ask questions and manage own conversations
            qa:feedback: Submit feedback
            qa:knowledge:read: Read knowledge metadata and use ACL-filtered debug retrieval
            qa:knowledge:write: Create knowledge bases and immutable document versions
            qa:ingestion:read: Read ingestion job status
            qa:ingestion:retry: Retry failed ingestion jobs
            qa:admin:users:read: Read tenant user lifecycle state
            qa:admin:users:write: Activate or disable tenant users
            qa:admin:groups:read: Read tenant groups and member counts
            qa:rag-config:read: Read immutable RAG configuration metadata
            qa:rag-config:write: Create RAG configuration drafts
            qa:rag-config:evaluate: Execute server-owned configuration gates
            qa:rag-config:approve: Independently approve a passing configuration
            qa:rag-config:publish: Publish an approved configuration
            qa:rag-config:rollback: Publish an immutable rollback clone
            qa:quota:read: Read tenant quota policy
            qa:quota:write: Change tenant quota policy
            qa:audit:read: Read safe governance audit events
            qa:audit:verify: Verify tenant governance audit integrity
            qa:usage:read: Read aggregate usage and quality summaries
            qa:security-incident:read: Read tenant security incidents
            qa:security-incident:write: Create and transition security incidents
            qa:evaluation:run: Execute an immutable quality evaluation run
            qa:evaluation:read: Read tenant-scoped evaluation evidence
            qa:operations:read: Read privacy-safe operational snapshots
            qa:release:read: Read tenant release evidence
            qa:release:create: Freeze an immutable release candidate
            qa:release:uat: Record controlled UAT evidence
            qa:release:signoff: Record category-bound independent release signoff
            qa:release:rollout: Start, advance, stop and roll back a release rehearsal
  parameters:
    ConversationId:
      name: conversation_id
      in: path
      required: true
      schema: {$ref: '#/components/schemas/Uuid'}
    MessageId:
      name: message_id
      in: path
      required: true
      schema: {$ref: '#/components/schemas/Uuid'}
    CitationId:
      name: citation_id
      in: path
      required: true
      schema: {$ref: '#/components/schemas/Uuid'}
    KnowledgeBaseId:
      name: knowledge_base_id
      in: path
      required: true
      schema: {$ref: '#/components/schemas/Uuid'}
    DocumentId:
      name: document_id
      in: path
      required: true
      schema: {$ref: '#/components/schemas/Uuid'}
    JobId:
      name: job_id
      in: path
      required: true
      schema: {$ref: '#/components/schemas/Uuid'}
    ConfigId:
      name: config_id
      in: path
      required: true
      schema: {$ref: '#/components/schemas/Uuid'}
    Limit:
      name: limit
      in: query
      schema: {type: integer, minimum: 1, maximum: 100, default: 20}
    Cursor:
      name: cursor
      in: query
      schema: {type: string, maxLength: 1024}
    RequestId:
      name: X-Request-ID
      in: header
      schema: {type: string, minLength: 8, maxLength: 128}
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema: {type: string, minLength: 16, maxLength: 128}
    IfMatch:
      name: If-Match
      in: header
      required: true
      schema: {type: string}
  schemas:
    Uuid:
      type: string
      format: uuid
    Timestamp:
      type: string
      format: date-time
    TenantSummary:
      type: object
      additionalProperties: false
      required: [id, code]
      properties:
        id: {$ref: '#/components/schemas/Uuid'}
        code: {type: string, minLength: 3, maxLength: 64}
    Me:
      type: object
      additionalProperties: false
      required: [id, tenant, roles, permissions, display_name, locale]
      properties:
        id: {$ref: '#/components/schemas/Uuid'}
        tenant: {$ref: '#/components/schemas/TenantSummary'}
        roles:
          type: array
          uniqueItems: true
          items: {type: string}
        permissions:
          type: array
          uniqueItems: true
          items: {type: string}
        display_name: {type: string, minLength: 1, maxLength: 200}
        locale: {type: string, minLength: 2, maxLength: 16}
    Sha256:
      type: string
      pattern: '^[a-fA-F0-9]{64}$'
    ConversationCreate:
      type: object
      additionalProperties: false
      required: [channel]
      properties:
        title: {type: string, minLength: 1, maxLength: 300}
        knowledge_base_ids:
          type: array
          maxItems: 10
          uniqueItems: true
          items: {$ref: '#/components/schemas/Uuid'}
        channel: {type: string, enum: [web, api, approved_connector]}
        metadata:
          type: object
          maxProperties: 20
          additionalProperties: true
    Conversation:
      type: object
      required: [id, title, status, channel, knowledge_base_ids, metadata, created_at, updated_at]
      properties:
        id: {$ref: '#/components/schemas/Uuid'}
        title: {type: string}
        status: {type: string, enum: [active, archived]}
        channel: {type: string, enum: [web, api, approved_connector]}
        knowledge_base_ids:
          type: array
          items: {$ref: '#/components/schemas/Uuid'}
        metadata: {type: object, additionalProperties: true}
        created_at: {$ref: '#/components/schemas/Timestamp'}
        updated_at: {$ref: '#/components/schemas/Timestamp'}
    ModelSummary:
      type: object
      additionalProperties: false
      required: [id, display_name, capabilities, status, max_context_tokens, allowed_policies]
      properties:
        id: {type: string, minLength: 1, maxLength: 64}
        display_name: {type: string, minLength: 1, maxLength: 200}
        capabilities:
          type: array
          items: {type: string}
        status: {type: string, enum: [available, degraded]}
        max_context_tokens: {type: integer, minimum: 1}
        allowed_policies:
          type: array
          items: {type: string, enum: [fast, balanced, quality]}
    ChatCompletionRequest:
      type: object
      additionalProperties: false
      required: [conversation_id, message, stream]
      properties:
        conversation_id: {$ref: '#/components/schemas/Uuid'}
        message: {type: string, minLength: 1, maxLength: 8000}
        knowledge_base_ids:
          type: array
          maxItems: 10
          uniqueItems: true
          items: {$ref: '#/components/schemas/Uuid'}
        stream: {type: boolean}
        model_policy: {type: string, enum: [fast, balanced, quality], default: balanced}
        response_mode:
          type: string
          enum: [general, grounded_answer, search_only]
          default: general
        client_context:
          type: object
          additionalProperties: false
          properties:
            locale: {type: string, minLength: 2, maxLength: 16}
    ChatCompletionResponse:
      type: object
      required: [request_id, message, citations, usage]
      properties:
        request_id: {type: string}
        message: {$ref: '#/components/schemas/Message'}
        citations:
          type: array
          items: {$ref: '#/components/schemas/Citation'}
        usage: {$ref: '#/components/schemas/Usage'}
    Message:
      type: object
      required: [id, conversation_id, role, content, status, sequence_no, created_at, response_mode, knowledge_base_ids, citations]
      properties:
        id: {$ref: '#/components/schemas/Uuid'}
        conversation_id: {$ref: '#/components/schemas/Uuid'}
        role: {type: string, enum: [user, assistant]}
        content: {type: [string, 'null']}
        content_format: {type: string, enum: [text, markdown, json], default: markdown}
        status: {type: string, enum: [pending, streaming, completed, failed, cancelled, blocked]}
        sequence_no: {type: integer, minimum: 1}
        finish_reason: {type: [string, 'null'], enum: [stop, length, cancelled, content_filter, error, abstained, null]}
        provider: {type: [string, 'null']}
        model: {type: [string, 'null']}
        error_code: {type: [string, 'null']}
        created_at: {$ref: '#/components/schemas/Timestamp'}
        completed_at:
          oneOf:
            - $ref: '#/components/schemas/Timestamp'
            - type: 'null'
        response_mode: {type: string, enum: [general, grounded_answer, search_only], default: general}
        knowledge_base_ids:
          type: array
          items: {$ref: '#/components/schemas/Uuid'}
        retrieval_run_id:
          oneOf:
            - $ref: '#/components/schemas/Uuid'
            - type: 'null'
        prompt_version: {type: [string, 'null']}
        abstention_reason: {type: [string, 'null']}
        citations:
          type: array
          items: {$ref: '#/components/schemas/Citation'}
    RetryRequest:
      type: object
      additionalProperties: false
      properties:
        stream: {type: boolean, default: true}
        model_policy: {type: string, enum: [fast, balanced, quality], default: balanced}
    Citation:
      type: object
      required: [id, ordinal, source_id, document_id, document_version_id, document_title, version, section_path, quote, relevance_score]
      properties:
        id: {$ref: '#/components/schemas/Uuid'}
        ordinal: {type: integer, minimum: 1}
        source_id: {type: string, pattern: '^SRC-[0-9]{3}$'}
        document_id: {$ref: '#/components/schemas/Uuid'}
        document_version_id: {$ref: '#/components/schemas/Uuid'}
        document_title: {type: string, maxLength: 500}
        version: {type: integer, minimum: 1}
        page_from: {type: [integer, 'null'], minimum: 1}
        page_to: {type: [integer, 'null'], minimum: 1}
        section_path:
          type: array
          items: {type: string}
        quote: {type: string, maxLength: 1200}
        relevance_score: {type: number, minimum: 0, maximum: 1}
    CitationDetail:
      allOf:
        - $ref: '#/components/schemas/Citation'
        - type: object
          required: [message_id, access_checked_at, source_url]
          properties:
            message_id: {$ref: '#/components/schemas/Uuid'}
            access_checked_at: {$ref: '#/components/schemas/Timestamp'}
            source_url: {type: 'null'}
    Usage:
      type: object
      required: [input_tokens, output_tokens, estimated]
      properties:
        input_tokens: {type: integer, minimum: 0}
        output_tokens: {type: integer, minimum: 0}
        cached_tokens: {type: integer, minimum: 0, default: 0}
        estimated: {type: boolean}
        amount: {type: [string, 'null'], pattern: '^\d+(\.\d{1,8})?$'}
        currency: {type: [string, 'null'], minLength: 3, maxLength: 3}
    FeedbackRequest:
      type: object
      additionalProperties: false
      required: [rating, reason_code]
      properties:
        rating: {type: integer, enum: [-1, 1]}
        reason_code:
          type: string
          enum: [helpful, incorrect, factually_unsupported, incorrect_citation, outdated, unsafe, other]
        comment: {type: string, maxLength: 2000}
    Feedback:
      allOf:
        - $ref: '#/components/schemas/FeedbackRequest'
        - type: object
          required: [id, message_id, snapshot, created_at, updated_at]
          properties:
            id: {$ref: '#/components/schemas/Uuid'}
            message_id: {$ref: '#/components/schemas/Uuid'}
            snapshot: {type: object, additionalProperties: true}
            created_at: {$ref: '#/components/schemas/Timestamp'}
            updated_at: {$ref: '#/components/schemas/Timestamp'}
    KnowledgeBaseCreate:
      type: object
      additionalProperties: false
      required: [code, name, classification]
      properties:
        code: {type: string, pattern: '^[a-z][a-z0-9_-]{2,63}$'}
        name: {type: string, minLength: 1, maxLength: 200}
        description: {type: string, maxLength: 2000}
        classification: {type: string, enum: [public, internal, confidential, restricted]}
    KnowledgeBase:
      allOf:
        - $ref: '#/components/schemas/KnowledgeBaseCreate'
        - type: object
          required: [id, status, created_at, updated_at]
          properties:
            id: {$ref: '#/components/schemas/Uuid'}
            status: {type: string, enum: [active, archived]}
            created_at: {$ref: '#/components/schemas/Timestamp'}
            updated_at: {$ref: '#/components/schemas/Timestamp'}
    AclEntry:
      type: object
      additionalProperties: false
      required: [subject_type, subject_id, permission]
      properties:
        subject_type: {type: string, enum: [user, group, role]}
        subject_id: {type: string, minLength: 1, maxLength: 128}
        permission: {type: string, const: read}
    DocumentCreate:
      type: object
      additionalProperties: false
      required: [title, filename, mime_type, size_bytes, sha256, classification, acl]
      properties:
        title: {type: string, minLength: 1, maxLength: 300}
        filename: {type: string, minLength: 1, maxLength: 255}
        mime_type:
          type: string
          enum: [application/pdf, application/vnd.openxmlformats-officedocument.wordprocessingml.document, text/plain, text/markdown]
        size_bytes: {type: integer, minimum: 1, maximum: 104857600}
        sha256: {$ref: '#/components/schemas/Sha256'}
        classification: {type: string, enum: [public, internal, confidential, restricted]}
        acl:
          type: array
          minItems: 1
          maxItems: 100
          items: {$ref: '#/components/schemas/AclEntry'}
        metadata:
          type: object
          maxProperties: 20
          additionalProperties: true
    DocumentVersionCreate:
      type: object
      additionalProperties: false
      required: [filename, mime_type, size_bytes, sha256]
      properties:
        filename: {type: string, minLength: 1, maxLength: 255}
        mime_type:
          type: string
          enum: [application/pdf, application/vnd.openxmlformats-officedocument.wordprocessingml.document, text/plain, text/markdown]
        size_bytes: {type: integer, minimum: 1, maximum: 104857600}
        sha256: {$ref: '#/components/schemas/Sha256'}
    DocumentVersion:
      type: object
      required: [id, version_no, filename, declared_mime_type, declared_size_bytes, declared_sha256, status, created_at]
      properties:
        id: {$ref: '#/components/schemas/Uuid'}
        version_no: {type: integer, minimum: 1}
        filename: {type: string}
        declared_mime_type: {type: string}
        detected_mime_type: {type: [string, 'null']}
        declared_size_bytes: {type: integer, minimum: 1}
        actual_size_bytes: {type: [integer, 'null']}
        declared_sha256: {$ref: '#/components/schemas/Sha256'}
        actual_sha256:
          oneOf:
            - $ref: '#/components/schemas/Sha256'
            - type: 'null'
        status: {type: string, enum: [awaiting_upload, queued, processing, published, failed, archived]}
        parser_version: {type: [string, 'null']}
        chunker_version: {type: [string, 'null']}
        embedding_model: {type: [string, 'null']}
        page_count: {type: [integer, 'null']}
        chunk_count: {type: [integer, 'null']}
        token_count: {type: [integer, 'null']}
        created_at: {$ref: '#/components/schemas/Timestamp'}
        published_at:
          oneOf:
            - $ref: '#/components/schemas/Timestamp'
            - type: 'null'
    DocumentUpload:
      type: object
      required: [document_id, version, upload_url, upload_method, upload_headers, upload_expires_at]
      properties:
        document_id: {$ref: '#/components/schemas/Uuid'}
        version: {$ref: '#/components/schemas/DocumentVersion'}
        upload_url: {type: string, format: uri}
        upload_method: {type: string, const: PUT}
        upload_headers:
          type: object
          additionalProperties: {type: string}
        upload_expires_at: {$ref: '#/components/schemas/Timestamp'}
    Document:
      type: object
      required: [id, knowledge_base_id, title, status, classification, metadata, acl, versions, created_at, updated_at]
      properties:
        id: {$ref: '#/components/schemas/Uuid'}
        knowledge_base_id: {$ref: '#/components/schemas/Uuid'}
        title: {type: string}
        status: {type: string, enum: [awaiting_upload, processing, ready, failed, archived]}
        classification: {type: string, enum: [public, internal, confidential, restricted]}
        current_version_id:
          oneOf:
            - $ref: '#/components/schemas/Uuid'
            - type: 'null'
        metadata: {type: object, additionalProperties: true}
        acl:
          type: array
          items: {$ref: '#/components/schemas/AclEntry'}
        versions:
          type: array
          items: {$ref: '#/components/schemas/DocumentVersion'}
        latest_job:
          oneOf:
            - $ref: '#/components/schemas/Job'
            - type: 'null'
        created_at: {$ref: '#/components/schemas/Timestamp'}
        updated_at: {$ref: '#/components/schemas/Timestamp'}
    JobSummary:
      $ref: '#/components/schemas/Job'
    Job:
      type: object
      required: [id, document_id, version_id, status, stage, progress, attempt, max_attempts, metrics, created_at, updated_at]
      properties:
        id: {$ref: '#/components/schemas/Uuid'}
        document_id: {$ref: '#/components/schemas/Uuid'}
        version_id: {$ref: '#/components/schemas/Uuid'}
        status: {type: string, enum: [queued, running, completed, failed, dead_letter]}
