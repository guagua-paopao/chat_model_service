name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12", cache: pip}
      - run: python -m pip install --upgrade pip && python -m pip install -r requirements.lock && python -m pip install -e ".[dev]"
      - run: ruff check apps/api/src apps/api/scripts apps/fake-idp/src tests
      - run: mypy apps/api/src apps/fake-idp/src
      - run: pytest -W error --cov=qa_api --cov=fake_idp --cov-fail-under=85 --cov-report=xml
        env: {PYTHONPATH: "apps/api/src:apps/fake-idp/src"}
      - name: Migration round-trip
        run: |
          export QA_DATABASE_URL=sqlite+pysqlite:///./migration-check.db
          alembic upgrade head
          alembic downgrade base
          alembic upgrade head
      - run: pip-audit -r requirements.lock

  web:
    runs-on: ubuntu-latest
    defaults:
      run: {working-directory: apps/web}
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: "22", cache: npm, cache-dependency-path: apps/web/package-lock.json}
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm audit --audit-level=moderate --registry=https://registry.npmjs.org

  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: {fetch-depth: 0}
      - uses: gitleaks/gitleaks-action@v2
        env: {GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"}
      - run: docker build -f apps/api/Dockerfile -t enterprise-qa-api:ci .
      - run: docker build -f apps/worker/Dockerfile -t enterprise-qa-worker:ci .
      - run: docker build -f apps/fake-idp/Dockerfile -t enterprise-qa-fake-idp:ci .
      - run: docker build -f apps/web/Dockerfile -t enterprise-qa-web:ci .
